name: Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name, for example 1.0.1"
        required: true
        default: "1.0.5"
      version_code:
        description: "Android versionCode"
        required: true
        default: "105"
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build APK and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release signing key
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/liuguang-release.jks"

      - name: Test and build signed release APK
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ runner.temp }}/liuguang-release.jks
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon testDebugUnitTest assembleRelease \
            -PVERSION_NAME=${{ inputs.version_name }} \
            -PVERSION_CODE=${{ inputs.version_code }}

      - name: Rename artifact
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk \
            release-artifacts/liuguang-downloader-v${{ inputs.version_name }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: 流光下载器 v${{ inputs.version_name }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: release-artifacts/liuguang-downloader-v${{ inputs.version_name }}.apk
